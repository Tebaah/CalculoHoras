<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de Horas</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>⏱️ Cálculo de Horas</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="ordenes.html" class="nav-item active" id="nav-ordenes">
                    <span class="nav-icon">📋</span>
                    <span class="nav-text">Órdenes de Trabajo</span>
                </a>
                <a href="reportes.html" class="nav-item" id="nav-reportes">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">Reportes</span>
                </a>
            </nav>
        </aside>
        <main class="main-content">
            <div class="welcome-card">
                <h1>Bienvenido al Sistema de Cálculo de Horas</h1>
                <p>Seleccione una opción del menú lateral para comenzar.</p>
                <div class="welcome-options">
                    <a href="ordenes.html" class="welcome-btn">
                        <span class="welcome-icon">📋</span>
                        <span>Órdenes de Trabajo</span>
                        <span class="welcome-desc">Calcule horas y costos de servicios</span>
                    </a>
                    <a href="reportes.html" class="welcome-btn">
                        <span class="welcome-icon">📊</span>
                        <span>Reportes</span>
                        <span class="welcome-desc">Visualice reportes y estadísticas</span>
                    </a>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Highlight current page in sidebar based on URL
        const currentPath = window.location.pathname.split('/').pop() || 'index.html';
        if (currentPath === 'ordenes.html') {
            document.getElementById('nav-ordenes').classList.add('active');
        } else if (currentPath === 'reportes.html') {
            document.getElementById('nav-reportes').classList.add('active');
        }
    </script>
</body>
</html>
