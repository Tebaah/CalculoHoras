<!DOCTYPE html>
<html lang="es-CL">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial - Cálculo de Horas</title>
    <link rel="stylesheet" href="css/main.css">
</head>

<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Cálculo de Horas</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="ordenes.html" class="nav-item" id="nav-ordenes">
                    <span class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11v6"/><path d="M9 14h6"/></svg>
                    </span>
                    <span class="nav-text">Órdenes de Trabajo</span>
                </a>
                <a href="reportes.html" class="nav-item" id="nav-reportes">
                    <span class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 16l4-8 4 4 4-6"/></svg>
                    </span>
                    <span class="nav-text">Reportes</span>
                </a>
                <a href="pagos.html" class="nav-item" id="nav-pagos">
                    <span class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 18V6"/></svg>
                    </span>
                    <span class="nav-text">Estados de Pago</span>
                </a>
                <a href="historial.html" class="nav-item active" id="nav-historial">
                    <span class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                    </span>
                    <span class="nav-text">Historial</span>
                </a>
            </nav>
        </aside>
        <main class="main-content">
            <div class="container container--wide">
                <h1 class="page-heading">Historial de Registros</h1>

                <div class="historial-actions">
                    <div class="form-row historial-toolbar">
                        <div class="form-group">
                            <label for="filtroIndice">Buscar por índice</label>
                            <input type="text" id="filtroIndice" placeholder="Ingrese índice a buscar..."
                                maxlength="20">
                        </div>
                        <div class="form-group">
                            <label for="filtroTipo">Filtrar por tipo</label>
                            <select id="filtroTipo">
                                <option value="todos">Todos</option>
                                <option value="orden">Órdenes</option>
                                <option value="reporte">Reportes</option>
                            </select>
                        </div>
                        <div class="toolbar-btns">
                            <button type="button" id="exportarBtn" class="btn-sm btn-sm-export">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                                Exportar
                            </button>
                            <button type="button" id="importarBtn" class="btn-sm btn-sm-import">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                Importar
                            </button>
                        </div>
                    </div>
                    <input type="file" id="fileInput" accept=".json" style="display: none;">
                </div>

                <div class="historial-table-container">
                    <table class="historial-table" id="historialTable">
                        <thead>
                            <tr>
                                <th>Índice</th>
                                <th>Tipo</th>
                                <th>Fecha</th>
                                <th>Horas Sin Recargo</th>
                                <th>Horas Con Recargo</th>
                                <th>Monto Total</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="historialBody">
                            <tr>
                                <td colspan="7" class="empty-message">No hay registros almacenados. Realice cálculos en
                                    Órdenes de Trabajo o Reportes y guárdelos con un índice.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="results" id="detailResults">
                    <div id="detailContent"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="/src/historial.js"></script>
</body>

</html>
